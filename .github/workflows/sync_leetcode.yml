name: Sync Leetcode History

on:
  workflow_dispatch: # Allows you to run it manually with a single click

permissions:
  contents: write # Tells GitHub to allow this script to create your folders

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Cook Submissions
        uses: joshcai/leetcode-sync@v1.7
        with:
          github-token: ${{ github.token }}
          leetcode-csrf-token: ${{ secrets.LEETCODE_CSRF_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}
          destination-folder: 'LeetCode-DSA' # Keeps it separate from NeetCode folders
